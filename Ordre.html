<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Sens des Grandeurs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
:root{
  --ink:#2B1820;          /* page bg + text-on-card */
  --ink-deep:#1B0E13;
  --wine:#4A2C34;          /* correct state, dark dividers */
  --mauve:#8C6266;         /* borders on card, muted icons */
  --peach:#F0BCA0;         /* card / paper bg */
  --peach-light:#F7D7C2;   /* subtle tinted panels */
  --terracotta:#D2693F;    /* primary accent */
  --red:#D9402E;           /* alert / incorrect / risk-high */
  --text-dark:#F4E2D6;     /* body text on dark page bg */
  --text-dark-mute:rgba(244,226,214,.66);
  --text-card-mute:#6B4540; /* muted text on peach card */
  --line: rgba(210,105,63,.4);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--ink);
  color:var(--text-dark);
  font-family:'Work Sans', sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  font-size:16px;
}
.app{
  max-width:760px;
  margin:0 auto;
  padding:30px 20px 80px;
}
h1,h2,h3{
  font-family:'Fraunces', serif;
  font-weight:600;
  letter-spacing:-0.01em;
  margin:0;
}
.eyebrow{
  font-family:'IBM Plex Mono', monospace;
  font-size:12px;
  font-weight:600;
  letter-spacing:.13em;
  text-transform:uppercase;
  color:var(--terracotta);
  margin-bottom:10px;
  display:block;
}
.mono{font-family:'IBM Plex Mono', monospace;}

/* ---------- top progress bar ---------- */
.topbar{
  height:4px;
  background:rgba(244,226,214,.14);
  border-radius:4px;
  overflow:hidden;
  margin-bottom:18px;
}
.topbar-fill{
  height:100%;
  background:var(--terracotta);
  transition:width .45s cubic-bezier(.6,0,.2,1);
}

/* ---------- domain pill ---------- */
.domain-pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-family:'IBM Plex Mono', monospace;
  font-size:12px;
  font-weight:600;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--text-dark);
  background:rgba(140,98,102,.28);
  border:1px solid var(--mauve);
  padding:6px 12px;
  border-radius:30px;
  margin-bottom:20px;
}
.domain-pill .num{
  background:var(--terracotta);
  color:var(--ink-deep);
  width:18px;height:18px;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:11px;
}

/* ---------- log ruler (domain 1 only) ---------- */
.ruler-wrap{ margin-bottom:26px; }
.ruler{
  position:relative;
  height:50px;
  border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);
}
.ruler .tick{
  position:absolute; top:0; bottom:0; width:1px;
  background:var(--line);
}
.ruler .tick span{
  position:absolute; top:50%;
  transform:translate(-50%,-50%);
  font-family:'IBM Plex Mono', monospace;
  font-size:11px;
  font-weight:500;
  color:var(--text-dark-mute);
  white-space:nowrap;
  background:var(--ink);
  padding:0 7px;
}
.ruler .marker{
  position:absolute; top:-6px;
  width:2px; height:62px;
  background:var(--terracotta);
  transition:left .5s cubic-bezier(.6,0,.2,1);
}
.ruler .marker::after{
  content:'';
  position:absolute; top:-5px; left:50%;
  transform:translateX(-50%);
  width:10px;height:10px;
  background:var(--terracotta);
  border-radius:50%;
}

/* ---------- growth dots (domain 2 only) ---------- */
.growth-wrap{
  display:flex; align-items:flex-end; gap:14px;
  height:60px; margin-bottom:26px;
  padding:0 4px 8px;
  border-bottom:1px solid var(--line);
}
.growth-dot{
  border-radius:50%;
  background:rgba(244,226,214,.15);
  border:1px solid var(--mauve);
  transition:all .4s ease;
}
.growth-dot.active{
  background:var(--terracotta);
  border-color:var(--terracotta);
}
.growth-caption{
  font-family:'IBM Plex Mono', monospace;
  font-size:11px;
  color:var(--text-dark-mute);
  margin:-18px 0 26px;
}

/* ---------- cards ---------- */
.card{
  background:var(--peach);
  color:var(--ink);
  border-radius:3px;
  padding:36px 32px;
  position:relative;
  box-shadow:0 30px 60px -25px rgba(0,0,0,.65);
}
.card::before, .card::after{
  content:'';
  position:absolute;
  width:32px; height:32px;
  border:1.5px solid var(--terracotta);
  opacity:.7;
}
.card::before{ top:10px; left:10px; border-right:none; border-bottom:none; }
.card::after{ bottom:10px; right:10px; border-left:none; border-top:none; }

.step-label{
  font-family:'IBM Plex Mono', monospace;
  font-size:12px;
  font-weight:600;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--wine);
  opacity:.85;
  margin-bottom:14px;
}
.question{
  font-size:24px;
  line-height:1.34;
  margin-bottom:6px;
  font-weight:500;
}
.helper{
  font-size:15px;
  color:var(--text-card-mute);
  margin-top:10px;
  line-height:1.55;
}

/* QCM options */
.options{
  margin-top:24px;
  display:flex;
  flex-direction:column;
  gap:11px;
}
.opt{
  text-align:left;
  border:1.5px solid var(--mauve);
  background:rgba(255,255,255,.18);
  color:var(--ink);
  padding:15px 18px;
  font-family:'Work Sans',sans-serif;
  font-size:16px;
  font-weight:500;
  border-radius:3px;
  cursor:pointer;
  transition:border-color .15s, background .15s;
  display:flex; align-items:center; gap:10px;
}
.opt:hover{ border-color:var(--terracotta); }
.opt.selected{ border-color:var(--terracotta); background:rgba(210,105,63,.16); }
.opt.correct{ border-color:var(--wine); background:rgba(74,44,52,.18); font-weight:600; }
.opt.incorrect{ border-color:var(--red); background:rgba(217,64,46,.14); }
.opt:disabled{ cursor:default; }
.opt .mark{ font-weight:700; width:16px; flex:none; }

/* numeric input */
.numrow{
  margin-top:26px;
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}
.numrow input[type=number]{
  font-family:'IBM Plex Mono', monospace;
  font-size:21px;
  font-weight:600;
  padding:12px 14px;
  width:170px;
  border:1.5px solid var(--mauve);
  border-radius:3px;
  background:#fbf2e9;
  color:var(--ink);
}
.numrow input[type=number]:focus{ outline:2px solid var(--terracotta); outline-offset:1px;}
.unit{ font-family:'IBM Plex Mono', monospace; font-size:14px; color:var(--text-card-mute); font-weight:500;}

/* likert */
.likert{
  margin-top:26px;
  display:flex;
  gap:9px;
  justify-content:space-between;
}
.likert button{
  flex:1;
  height:50px;
  border:1.5px solid var(--mauve);
  background:rgba(255,255,255,.18);
  border-radius:3px;
  cursor:pointer;
  font-family:'IBM Plex Mono', monospace;
  font-size:15px;
  font-weight:600;
  color:var(--ink);
}
.likert button.selected{ background:var(--terracotta); color:var(--ink-deep); border-color:var(--terracotta); }
.likert-labels{
  display:flex; justify-content:space-between;
  font-size:12.5px; color:var(--text-card-mute); margin-top:8px; font-weight:500;
}

/* feedback */
.feedback{
  margin-top:22px;
  padding:16px 18px;
  border-left:4px solid var(--wine);
  background:rgba(74,44,52,.1);
  font-size:15px;
  line-height:1.6;
  display:none;
  color:var(--ink);
}
.feedback.show{display:block;}
.feedback b{ color:var(--wine); }

/* buttons */
.actions{
  margin-top:30px;
  display:flex;
  justify-content:flex-end;
  gap:12px;
}
.btn{
  font-family:'IBM Plex Mono', monospace;
  font-size:13.5px;
  font-weight:600;
  letter-spacing:.05em;
  text-transform:uppercase;
  padding:14px 28px;
  border-radius:3px;
  border:1.5px solid var(--terracotta);
  background:var(--terracotta);
  color:#fff3ec;
  cursor:pointer;
  transition:opacity .15s, transform .1s;
}
.btn:hover{ opacity:.88; }
.btn:active{ transform:translateY(1px); }
.btn:disabled{ opacity:.35; cursor:not-allowed; }
.btn.ghost{
  background:transparent;
  color:var(--ink);
  border-color:var(--mauve);
}

/* intro */
.intro-title{
  font-size:40px;
  line-height:1.1;
  margin-bottom:18px;
}
.intro-sub{
  font-size:16.5px;
  color:var(--text-dark-mute);
  line-height:1.65;
  max-width:56ch;
  margin-bottom:8px;
}
.domain-list{
  margin-top:26px;
  display:flex; flex-direction:column; gap:10px;
}
.domain-item{
  display:flex; gap:14px; align-items:flex-start;
  background:rgba(244,226,214,.06);
  border:1px solid rgba(140,98,102,.4);
  border-radius:3px;
  padding:14px 16px;
}
.domain-item .num{
  font-family:'IBM Plex Mono', monospace;
  font-weight:700;
  color:var(--terracotta);
  font-size:18px;
  flex:none;
  width:24px;
}
.domain-item .txt b{ display:block; font-size:15px; margin-bottom:2px; color:var(--text-dark); }
.domain-item .txt span{ font-size:13.5px; color:var(--text-dark-mute); line-height:1.5; }

.example-box{
  margin-top:22px;
  padding:16px 18px;
  background:var(--peach-light);
  border-radius:3px;
  font-size:14.5px;
  line-height:1.6;
  color:var(--ink);
}

/* results */
.results-head{ text-align:center; margin-bottom:8px; }
.section-title{
  font-size:13px;
  font-family:'IBM Plex Mono', monospace;
  font-weight:600;
  letter-spacing:.13em;
  text-transform:uppercase;
  color:var(--terracotta);
  margin: 40px 0 14px;
}
.chart-wrap{
  background:var(--peach);
  border-radius:3px;
  padding:24px 18px 8px;
  position:relative;
}
.chart-wrap::before, .chart-wrap::after{
  content:'';
  position:absolute;
  width:32px; height:32px;
  border:1.5px solid var(--terracotta);
  opacity:.7;
}
.chart-wrap::before{ top:10px; left:10px; border-right:none; border-bottom:none; }
.chart-wrap::after{ bottom:10px; right:10px; border-left:none; border-top:none; }

.gauge-card{
  background:var(--peach);
  color:var(--ink);
  border-radius:3px;
  padding:28px 28px 24px;
}
.gauge-track{
  position:relative;
  height:10px;
  background:linear-gradient(90deg, var(--wine) 0%, var(--terracotta) 50%, var(--red) 100%);
  border-radius:6px;
  margin:20px 0 8px;
}
.gauge-marker{
  position:absolute; top:-9px;
  width:3px; height:28px;
  background:var(--ink);
  transform:translateX(-50%);
}
.gauge-ends{
  display:flex; justify-content:space-between;
  font-family:'IBM Plex Mono', monospace;
  font-size:11.5px;
  font-weight:600;
  color:var(--text-card-mute);
}
.profile-name{
  font-family:'Fraunces', serif;
  font-size:27px;
  font-weight:600;
  margin:18px 0 6px;
}
.stat-row{ display:flex; gap:26px; margin-top:16px; flex-wrap:wrap; }
.stat{ font-family:'IBM Plex Mono', monospace; }
.stat .v{ font-size:21px; font-weight:700; color:var(--wine); display:block; }
.stat .l{ font-size:11.5px; color:var(--text-card-mute); text-transform:uppercase; letter-spacing:.07em; font-weight:600; }

.recap-card{ background:var(--peach); border-radius:3px; padding:22px 26px; }
.recap-item{
  display:flex; justify-content:space-between; gap:16px;
  padding:12px 0; border-bottom:1px solid var(--mauve); font-size:15px;
}
.recap-item:last-child{ border-bottom:none; }
.recap-item .q{ color:var(--text-card-mute); }
.recap-item .a{ font-weight:700; font-family:'IBM Plex Mono', monospace; color:var(--wine); text-align:right; }

.synth{ margin-top:32px; font-size:15.5px; line-height:1.7; color:var(--text-dark); }
.synth b{ color:var(--terracotta); }

.restart-row{ margin-top:38px; text-align:center; }
footer{
  margin-top:60px; font-size:12px; color:var(--text-dark-mute);
  text-align:center; line-height:1.7;
}

@media (max-width:540px){
  .card{ padding:26px 20px; }
  .intro-title{ font-size:30px; }
  .question{ font-size:20px; }
  .ruler .tick span{ font-size:9.5px; padding:0 4px;}
  .likert{ gap:6px; }
  .likert button{ font-size:13px; height:46px;}
  .stat-row{ gap:18px; }
}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
/* ===================== DATA ===================== */

const RULER_TICKS = [
  {pos:0,   label:'10³ mille'},
  {pos:0.3, label:'10⁶ million'},
  {pos:0.62,label:'10⁹ milliard'},
  {pos:1,   label:'10¹² billion'}
];

const DOMAINS = {
  grandeur:   {n:1, label:'Ordres de grandeur'},
  croissance: {n:2, label:'Croissance exponentielle'},
  risque:     {n:3, label:'Profil de risque'}
};

function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function qcmScore(idx,correct){ return clamp(100-35*Math.abs(idx-correct),0,100); }
function logScore(value,trueVal,k=55){
  const v = Math.max(Number(value)||0.0001,0.0001);
  const diff = Math.abs(Math.log10(v/trueVal));
  return clamp(100-k*diff,0,100);
}
function fmt(n){ return new Intl.NumberFormat('fr-FR').format(Math.round(n)); }

const STEPS = [
  {id:'intro', type:'intro'},

  {id:'a1', type:'qcm', domain:'grandeur', cat:'temps',
   label:'Échelle temporelle — 1 / 3',
   q:'Un million de secondes, ça représente environ\u2026',
   options:['11 heures','11 jours','11 mois','11 ans'],
   correct:1,
   feedback:'1 000 000 s ÷ 86 400 s/jour ≈ <b>11,6 jours</b>. Le million reste une échelle « humaine », presque palpable.'},

  {id:'a2', type:'qcm', domain:'grandeur', cat:'temps',
   label:'Échelle temporelle — 2 / 3',
   q:'Un milliard de secondes, ça représente environ\u2026',
   options:['11 jours','1 an','32 ans','320 ans'],
   correct:2,
   feedback:'1 000 000 000 s ≈ <b>31,7 ans</b> — presque une vie de travail. Du million au milliard, on saute de « deux semaines » à « une génération ».'},

  {id:'a3', type:'qcm', domain:'grandeur', cat:'temps',
   label:'Échelle temporelle — 3 / 3',
   q:'Mille milliards de secondes (10¹², un « billion » anglo-saxon), ça représente environ\u2026',
   options:['32 ans','320 ans','3 200 ans','32 000 ans'],
   correct:3,
   feedback:'1 000 000 000 000 s ≈ <b>31 700 ans</b> — avant l\u2019agriculture, avant l\u2019écriture. Le saut milliard → mille milliards est bien plus violent que million → milliard.'},

  {id:'b1', type:'qcm', domain:'grandeur', cat:'espace',
   label:'Échelle physique — 1 / 2',
   q:'En empilant des billets de 100 €, une pile représentant 1 million d\u2019euros mesurerait environ\u2026',
   options:['10 cm','1 m','10 m','100 m'],
   correct:1,
   feedback:'10 000 billets de 0,1 mm d\u2019épaisseur ≈ <b>1 mètre</b>. Un million d\u2019euros tient littéralement dans une pièce.'},

  {id:'b2', type:'qcm', domain:'grandeur', cat:'espace',
   label:'Échelle physique — 2 / 2',
   q:'Et 1 milliard d\u2019euros en billets de 100 €, empilés, atteindrait à peu près\u2026',
   options:['La Tour Eiffel (330 m)','1 km de hauteur','Le Mont Blanc (4 800 m)','L\u2019Everest (8 800 m)'],
   correct:1,
   feedback:'×1000 la pile précédente : <b>environ 1 km</b> — plus de trois Tours Eiffel empilées, mais bien moins qu\u2019une montagne. L\u2019intuition « ça doit être immense » trompe presque tout le monde.'},

  {id:'c1', type:'qcm', domain:'grandeur', cat:'capital',
   label:'Choc d\u2019échelle — fortune',
   q:'Si vous dépensiez 1 million $ par jour, combien de temps faudrait-il pour épuiser une fortune de l\u2019ordre de 400 milliards $ (l\u2019ordre de grandeur cité pour Elon Musk) ?',
   options:['Environ 3 ans','Environ 30 ans','Environ 300 ans','Plus de 1 000 ans'],
   correct:3,
   feedback:'400 000 000 000 ÷ 1 000 000 = 400 000 jours ≈ <b>1 096 ans</b>. À ce rythme, on dépenserait toujours cette fortune si on avait commencé au Moyen Âge.'},

  {id:'c2', type:'numeric', domain:'grandeur', cat:'espace', unit:'km', true:80,
   label:'Estimation libre — empilement',
   q:'Avec des billets de 500 €, quelle hauteur (en kilomètres) ferait une pile représentant ces mêmes 400 milliards $ ?',
   helper:'Repère : l\u2019altitude de croisière d\u2019un avion de ligne est d\u2019environ 10 km, l\u2019ISS orbite vers 400 km.',
   feedbackFn:(v)=>`La réponse est environ <b>80 km</b> (800 millions de billets × 0,1 mm). Huit fois l\u2019altitude de croisière d\u2019un avion — mais cinq fois moins que l\u2019orbite de l\u2019ISS. Votre estimation : <b>${fmt(v)} km</b>.`},

  {id:'e1', type:'numeric', domain:'grandeur', cat:'capital', unit:'milliers de milliards $ (trillions)', true:125,
   label:'Estimation libre — masse monétaire',
   q:'Selon vous, quelle est la masse monétaire totale en circulation dans le monde, toutes devises confondues (en milliers de milliards de dollars) ?',
   helper:'« Mille milliards » = un trillion = 10¹².',
   feedbackFn:(v)=>`Les estimations tournent autour de <b>120 à 130 000 milliards $</b> (soit ~125 « mille milliards »). Votre estimation : <b>${fmt(v)} 000 milliards $</b>.`},

  {id:'g1', type:'qcm', domain:'croissance', cat:'croissance',
   label:'Croissance exponentielle — 1 / 3',
   q:'On plie une feuille de papier de 0,1 mm d\u2019épaisseur en deux, encore et encore — 42 fois au total (en imaginant que c\u2019est physiquement possible). Quelle épaisseur obtient-on ?',
   options:['21 centimètres','21 mètres','21 kilomètres','Plus que la distance Terre-Lune'],
   correct:3,
   feedback:'2⁴² × 0,1 mm ≈ <b>440 000 km</b> — plus que la distance Terre-Lune (384 400 km). Le doublement répété est la chose que notre intuition sous-estime le plus violemment.'},

  {id:'g2', type:'qcm', domain:'croissance', cat:'croissance',
   label:'Croissance exponentielle — 2 / 3',
   q:'Vous placez 10 000 € à un taux d\u2019intérêt composé de 7 %/an, sans rien ajouter ni retirer. Grâce à la « règle de 72 », au bout de combien d\u2019années votre capital double-t-il environ ?',
   options:['Environ 3 ans','Environ 7 ans','Environ 10 ans','Environ 20 ans'],
   correct:2,
   feedback:'Règle de 72 : 72 ÷ 7 ≈ <b>10,3 ans</b>. À ce rythme, en 40 ans (une carrière), le capital double presque quatre fois — soit ×16.'},

  {id:'g3', type:'numeric', domain:'croissance', cat:'croissance', unit:'€', true:5000,
   label:'Estimation libre — composition longue',
   q:'Si vous aviez investi 1 € en l\u20191900 à un rendement composé de 7 %/an (réinvesti, sans frais ni impôt), combien vaudrait ce 1 € aujourd\u2019hui, selon vous ?',
   helper:'126 ans de capitalisation à un taux pourtant modeste.',
   feedbackFn:(v)=>`1 € × 1,07¹²⁶ ≈ <b>5 000 €</b>. Un taux modeste de 7 %/an, maintenu 126 ans, multiplie la mise par plus de 5 000 — toute la puissance contre-intuitive des intérêts composés. Votre estimation : <b>${fmt(v)} €</b>.`},

  {id:'d1', type:'numeric', domain:'risque', cat:'risk', unit:'€', isPrice:true,
   label:'Le dilemme du distributeur',
   q:'Une machine à snacks dans un hall d\u2019immeuble génère un bénéfice net stable d\u2019environ 400 €/mois (4 800 €/an). Vous devrez gérer vous-même le réapprovisionnement et l\u2019entretien. Combien seriez-vous prêt·e à payer pour l\u2019acheter ?',
   helper:'Il n\u2019y a pas de bonne réponse — votre prix révèle votre tolérance au risque.'},

  {id:'d2', type:'likert', domain:'risque',
   label:'À considérer — 1 / 2',
   q:'À quel point la panne / l\u2019entretien de la machine vous inquiète-t-il ?',
   left:'Pas du tout', right:'Énormément'},

  {id:'d3', type:'likert', domain:'risque',
   label:'À considérer — 2 / 2',
   q:'Pensez-vous que la demande de snacks dans ce hall va plutôt\u2026',
   left:'Baisser', right:'Beaucoup augmenter'},

  {id:'d4', type:'qcm', domain:'risque', cat:'risk_horizon',
   label:'Horizon de retour sur investissement',
   q:'Combien de temps êtes-vous prêt·e à attendre avant de récupérer votre mise ?',
   options:['Moins d\u20191 an','1 à 3 ans','3 à 7 ans','7 à 15 ans','Peu importe, 15 ans et plus'],
   correct:null},

  {id:'results', type:'results'}
];

/* ===================== STATE ===================== */
let state = { step:0, answers:{} };
const app = document.getElementById('app');
const playSteps = STEPS.filter(s=>s.type!=='intro' && s.type!=='results');
const grandeurSteps = STEPS.filter(s=>s.domain==='grandeur');
const croissanceSteps = STEPS.filter(s=>s.domain==='croissance');

/* ===================== VISUAL HEADERS ===================== */
function topBarHTML(){
  const frac = state.step===0 ? 0 : (state.step>=STEPS.length-1 ? 1 : (playSteps.indexOf(STEPS[state.step]))/(playSteps.length-1));
  return `<div class="topbar"><div class="topbar-fill" style="width:${clamp(frac,0,1)*100}%"></div></div>`;
}
function domainPillHTML(step){
  const d = DOMAINS[step.domain];
  if(!d) return '';
  return `<div class="domain-pill"><span class="num">${d.n}</span> Domaine ${d.n} — ${d.label}</div>`;
}
function rulerHTML(frac){
  const ticks = RULER_TICKS.map(t=>`<div class="tick" style="left:${t.pos*100}%"><span>${t.label}</span></div>`).join('');
  return `<div class="ruler-wrap"><div class="ruler">${ticks}<div class="marker" style="left:${clamp(frac,0,1)*100}%"></div></div></div>`;
}
function growthDotsHTML(idx){
  // 6 dots representing a doubling sequence 1,2,4,8,16,32
  let dots='';
  for(let i=0;i<6;i++){
    const size = 8 + i*7;
    const active = i<=idx ? 'active':'';
    dots += `<div class="growth-dot ${active}" style="width:${size}px;height:${size}px"></div>`;
  }
  return `<div class="growth-wrap">${dots}</div><div class="growth-caption">1 → 2 → 4 → 8 → 16 → 32 — l\u2019intuition s\u2019effondre après quelques doublements</div>`;
}
function headerVisual(step){
  if(step.domain==='grandeur'){
    const idx = grandeurSteps.indexOf(step);
    return rulerHTML(idx/(grandeurSteps.length-1));
  }
  if(step.domain==='croissance'){
    const idx = croissanceSteps.indexOf(step);
    return growthDotsHTML(idx*2);
  }
  return '';
}

/* ===================== RENDER ===================== */
function render(){
  const step = STEPS[state.step];
  let html = topBarHTML();

  if(step.type === 'intro') html += renderIntro();
  else if(step.type === 'results') html += renderResults();
  else{
    html += domainPillHTML(step);
    html += headerVisual(step);
    if(step.type === 'qcm') html += renderQCM(step);
    else if(step.type === 'numeric') html += renderNumeric(step);
    else if(step.type === 'likert') html += renderLikert(step);
  }

  app.innerHTML = html;
  if(step.type === 'results') drawRadar();
}

function renderIntro(){
  return `
    <span class="eyebrow">Un test d\u2019intuition, pas un examen</span>
    <h1 class="intro-title">Le Sens des Grandeurs</h1>
    <p class="intro-sub">Notre cerveau confond facilement un million et un milliard — et il est encore plus mauvais face à la croissance exponentielle. Ce test évalue votre intuition financière sur trois domaines distincts :</p>
    <div class="domain-list">
      <div class="domain-item"><span class="num">1</span><div class="txt"><b>Ordres de grandeur</b><span>Temps, espace, capital — sentir la différence entre million, milliard et mille milliards.</span></div></div>
      <div class="domain-item"><span class="num">2</span><div class="txt"><b>Croissance exponentielle</b><span>Le doublement répété, les intérêts composés — le biais cognitif le plus universel face à l\u2019argent.</span></div></div>
      <div class="domain-item"><span class="num">3</span><div class="txt"><b>Profil de risque</b><span>Un dilemme d\u2019investissement concret pour esquisser votre rapport au risque.</span></div></div>
    </div>
    <div class="example-box">
      <b>Exemple qui inspire le domaine 3 :</b> un distributeur de snacks rapporte environ 400 €/mois. Combien seriez-vous prêt·e à l\u2019acheter ? Le prix que vous choisissez en dit plus long qu\u2019un sondage classique.
    </div>
    <div class="actions" style="justify-content:flex-start; margin-top:30px;">
      <button class="btn" onclick="goTo(1)">Commencer →</button>
    </div>
    <footer style="text-align:left; margin-top:40px;">Valeurs approximatives, à but pédagogique — pas des chiffres certifiés.</footer>
  `;
}

function renderQCM(step){
  const prev = state.answers[step.id];
  const opts = step.options.map((o,i)=>{
    let cls = 'opt', mark='';
    if(prev !== undefined){
      if(step.correct !== null){
        if(i === step.correct){ cls += ' correct'; mark='✓'; }
        else if(i === prev){ cls += ' incorrect'; mark='✗'; }
      } else if(i === prev){ cls += ' selected'; }
    }
    return `<button class="${cls}" ${prev!==undefined?'disabled':''} onclick="answerQCM('${step.id}',${i})">${mark?`<span class="mark">${mark}</span>`:''}${o}</button>`;
  }).join('');

  let feedback = (prev !== undefined && step.feedback) ? `<div class="feedback show">${step.feedback}</div>` : '';

  return `
    <div class="card">
      <div class="step-label">${step.label}</div>
      <div class="question">${step.q}</div>
      <div class="options">${opts}</div>
      ${feedback}
    </div>
    ${navButtons(prev !== undefined)}
  `;
}

function renderNumeric(step){
  const prev = state.answers[step.id];
  let feedback = (prev !== undefined && step.feedbackFn) ? `<div class="feedback show">${step.feedbackFn(prev)}</div>` : '';
  let helper = step.helper ? `<div class="helper">${step.helper}</div>` : '';
  return `
    <div class="card">
      <div class="step-label">${step.label}</div>
      <div class="question">${step.q}</div>
      ${helper}
      <div class="numrow">
        <input type="number" min="0" id="numinput" value="${prev!==undefined?prev:''}" placeholder="0" ${prev!==undefined?'disabled':''}>
        <span class="unit">${step.unit}</span>
        ${prev===undefined?`<button class="btn ghost" onclick="answerNumeric('${step.id}')">Valider</button>`:''}
      </div>
      ${feedback}
    </div>
    ${navButtons(prev !== undefined)}
  `;
}

function renderLikert(step){
  const prev = state.answers[step.id];
  const btns = [1,2,3,4,5].map(v=>`<button class="${prev===v?'selected':''}" onclick="answerLikert('${step.id}',${v})">${v}</button>`).join('');
  return `
    <div class="card">
      <div class="step-label">${step.label}</div>
      <div class="question">${step.q}</div>
      <div class="likert">${btns}</div>
      <div class="likert-labels"><span>${step.left}</span><span>${step.right}</span></div>
    </div>
    ${navButtons(prev !== undefined)}
  `;
}

function navButtons(canNext){
  const isLast = state.step === STEPS.length-2;
  return `
    <div class="actions">
      ${state.step>1?`<button class="btn ghost" onclick="goTo(${state.step-1})">← Retour</button>`:''}
      <button class="btn" ${canNext?'':'disabled'} onclick="goTo(${state.step+1})">${isLast?'Voir mes résultats →':'Suivant →'}</button>
    </div>
  `;
}

/* ===================== HANDLERS ===================== */
function answerQCM(id, idx){ if(state.answers[id] !== undefined) return; state.answers[id]=idx; render(); }
function answerNumeric(id){
  const input = document.getElementById('numinput');
  const v = parseFloat(input.value);
  if(isNaN(v) || v < 0){ input.focus(); return; }
  state.answers[id]=v; render();
}
function answerLikert(id, v){ state.answers[id]=v; render(); }
function goTo(i){ state.step=i; window.scrollTo({top:0,behavior:'smooth'}); render(); }
function restart(){ state={step:0,answers:{}}; render(); }

/* ===================== RESULTS ===================== */
function computeScores(){
  const a = state.answers;
  const temps = (qcmScore(a.a1,1)+qcmScore(a.a2,2)+qcmScore(a.a3,3))/3;
  const espace = (qcmScore(a.b1,1)+qcmScore(a.b2,1)+logScore(a.c2,80))/3;
  const capital = (qcmScore(a.c1,3)+logScore(a.e1,125))/2;
  const croissance = (qcmScore(a.g1,3)+qcmScore(a.g2,2)+logScore(a.g3,5000))/3;
  return {temps, espace, capital, croissance};
}
function a_or(v,d){ return (v===undefined||isNaN(v))?d:v; }
function computeRisk(){
  const price = Math.max(a_or(state.answers.d1, 4800),1);
  const yieldPct = 4800/price*100;
  const payback = price/4800;
  let profile, blurb;
  if(price <= 2400){ profile='Ultra-prudent·e'; blurb='Vous exigez un retour quasi immédiat — un rendement implicite de plus de 200 %/an. C\u2019est l\u2019attitude de quelqu\u2019un qui ne fait confiance qu\u2019au cash sous le matelas.'; }
  else if(price <= 4800){ profile='Très averse au risque'; blurb='Vous voulez rentrer dans vos frais en moins d\u2019un an : un rendement exigé de 100 % à 200 %/an, viable seulement si vous doutez fortement de la durabilité du flux.'; }
  else if(price <= 14400){ profile='Averse au risque'; blurb='Retour sur 1 à 3 ans, rendement exigé de 33 % à 100 %/an. C\u2019est le réflexe le plus courant face à un actif inconnu et non garanti.'; }
  else if(price <= 28800){ profile='Équilibré·e'; blurb='Retour sur 3 à 6 ans, rendement exigé de 17 % à 33 %/an — déjà proche de ce qu\u2019exigent des investisseurs en private equity pour un petit commerce.'; }
  else if(price <= 48000){ profile='Tolérant·e au risque'; blurb='Retour sur 6 à 10 ans, rendement exigé de 10 % à 17 %/an. Vous valorisez la stabilité du revenu presque autant que sa taille.'; }
  else if(price <= 96000){ profile='Très tolérant·e'; blurb='Retour sur 10 à 20 ans, rendement exigé de 5 % à 10 %/an — proche des multiples payés pour une rente obligataire de bonne qualité.'; }
  else { profile='Quasi-spéculatif·ve'; blurb='Retour au-delà de 20 ans, rendement exigé sous 5 %/an. Soit vous anticipez une forte croissance du flux, soit le prix payé n\u2019a plus grand-chose à voir avec les 400 €/mois actuels.'; }
  return {price, yieldPct, payback, profile, blurb};
}

function renderResults(){
  const s = computeScores();
  const r = computeRisk();
  const a = state.answers;

  const globalScore = Math.round((s.temps+s.espace+s.capital+s.croissance)/4);
  let globalLabel;
  if(globalScore>=80) globalLabel='Intuition aiguisée des grandes échelles';
  else if(globalScore>=55) globalLabel='Bonne intuition, quelques angles morts';
  else if(globalScore>=30) globalLabel='Le grand saut million → milliard vous échappe encore';
  else globalLabel='Les très grands nombres restent abstraits — comme pour presque tout le monde';

  const lo=500, hi=150000;
  const gaugePos = clamp(Math.log10(r.price/lo)/Math.log10(hi/lo),0,1)*100;

  const likertLabel = (v,left,right)=>{
    const map = {1:left, 2:`Plutôt ${left.toLowerCase()}`, 3:'Neutre', 4:`Plutôt ${right.toLowerCase()}`, 5:right};
    return map[v] || '—';
  };
  const horizonLabels = ['Moins d\u20191 an','1 à 3 ans','3 à 7 ans','7 à 15 ans','15 ans et plus'];

  return `
    <div class="results-head">
      <span class="eyebrow">Résultats</span>
      <h2 style="font-size:30px;">${globalLabel}</h2>
    </div>

    <div class="section-title">Domaine 1 + 2 — Intuition des grandeurs &amp; croissance</div>
    <div class="chart-wrap"><canvas id="radar" height="270"></canvas></div>

    <div class="section-title">Domaine 3 — Profil de risque</div>
    <div class="gauge-card">
      <div class="profile-name">${r.profile}</div>
      <p style="font-size:14.5px; line-height:1.6; color:var(--text-card-mute);">${r.blurb}</p>
      <div class="gauge-track"><div class="gauge-marker" style="left:${gaugePos}%"></div></div>
      <div class="gauge-ends"><span>Prudent</span><span>Spéculatif</span></div>
      <div class="stat-row">
        <div class="stat"><span class="v">${fmt(r.price)} €</span><span class="l">Prix proposé</span></div>
        <div class="stat"><span class="v">${r.payback.toFixed(1)} ans</span><span class="l">Retour sur mise</span></div>
        <div class="stat"><span class="v">${r.yieldPct.toFixed(0)} %</span><span class="l">Rendement exigé</span></div>
      </div>
    </div>

    <div class="section-title">Ce que vous avez pris en compte</div>
    <div class="recap-card">
      <div class="recap-item"><span class="q">Inquiétude panne / entretien</span><span class="a">${likertLabel(a.d2,'Pas du tout','Énormément')}</span></div>
      <div class="recap-item"><span class="q">Évolution attendue de la demande</span><span class="a">${likertLabel(a.d3,'Baisse','Forte hausse')}</span></div>
      <div class="recap-item"><span class="q">Horizon de retour accepté</span><span class="a">${horizonLabels[a.d4] ?? '—'}</span></div>
    </div>

    <p class="synth">
      Score combiné « grandeurs + croissance » : <b>${globalScore}/100</b>.
      ${globalScore<55 ? 'Rassurez-vous : la quasi-totalité des gens sous-estiment radicalement l\u2019écart entre un million, un milliard et mille milliards — et plus encore l\u2019effet du doublement répété. Notre cerveau n\u2019a tout simplement pas évolué pour ça.' : 'Vous naviguez plutôt bien entre ces échelles et la croissance composée, ce qui est rare : la plupart des gens compriment mentalement tout ce qui dépasse le million dans la même case « beaucoup ».'}
    </p>

    <div class="restart-row"><button class="btn ghost" onclick="restart()">↺ Recommencer le test</button></div>
    <footer>Toutes les valeurs de référence (secondes, hauteurs de billets, masse monétaire mondiale, taux composés, patrimoine cité) sont des ordres de grandeur approximatifs à visée pédagogique.</footer>
  `;
}

let radarChart;
function drawRadar(){
  const s = computeScores();
  const ctx = document.getElementById('radar');
  if(!ctx) return;
  if(radarChart) radarChart.destroy();
  radarChart = new Chart(ctx, {
    type:'radar',
    data:{
      labels:['Temps','Espace','Capital','Croissance'],
      datasets:[{
        label:'Votre score',
        data:[s.temps, s.espace, s.capital, s.croissance],
        backgroundColor:'rgba(210,105,63,0.28)',
        borderColor:'#D2693F',
        borderWidth:2.5,
        pointBackgroundColor:'#4A2C34',
        pointRadius:4.5
      }]
    },
    options:{
      responsive:true,
      scales:{
        r:{
          min:0, max:100,
          ticks:{ display:false, stepSize:25 },
          grid:{ color:'#C99A8A' },
          angleLines:{ color:'#C99A8A' },
          pointLabels:{ font:{ family:'IBM Plex Mono', size:14, weight:'700' }, color:'#4A2C34' }
        }
      },
      plugins:{ legend:{ display:false } }
    }
  });
}

render();
</script>
</body>
</html>
